<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MaestraAI Sync</title>
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      margin: 0;
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      margin: 0 0 16px 0;
      color: #111827;
    }
    .section {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 4px;
      color: #374151;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 8px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #4f6af0;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    button:hover {
      background: #3451c7;
    }
    .status {
      padding: 12px;
      background: #f3f4f6;
      border-radius: 8px;
      margin-top: 16px;
    }
    .status-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #e5e7eb;
    }
    .status-item:last-child {
      border-bottom: none;
    }
    .status-label {
      font-weight: 500;
      color: #374151;
    }
    .status-value {
      font-size: 12px;
      color: #6b7280;
    }
    .success {
      color: #22c55e;
    }
    .warning {
      color: #f59e0b;
    }
    .saved-msg {
      color: #22c55e;
      font-size: 12px;
      margin-top: 4px;
      display: none;
    }
  </style>
</head>
<body>
  <h1>MaestraAI Sync</h1>

  <div class="section">
    <label for="apiUrl">URL de MaestraAI</label>
    <input type="text" id="apiUrl" placeholder="https://maestraai.mx" />
  </div>

  <div class="section">
    <label for="ingestToken">Token de Sync</label>
    <input type="password" id="ingestToken" placeholder="Ingresa tu token" />
    <div class="saved-msg" id="savedMsg">✓ Configuración guardada</div>
  </div>

  <button id="saveBtn">Guardar Configuración</button>

  <div class="status">
    <div class="status-item">
      <span class="status-label">Grupo A</span>
      <span class="status-value" id="groupAStatus">⚠ Pendiente</span>
    </div>
    <div class="status-item">
      <span class="status-label">Grupo B</span>
      <span class="status-value" id="groupBStatus">⚠ Pendiente</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
