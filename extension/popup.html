<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MaestraAI Sync</title>
  <style>
    body {
      width: 360px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      margin: 0;
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      margin: 0 0 16px 0;
      color: #111827;
    }
    .section {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 4px;
      color: #374151;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 8px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #4f6af0;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    button:hover {
      background: #3451c7;
    }
    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
    button.secondary {
      background: white;
      color: #4f6af0;
      border: 1px solid #4f6af0;
    }
    button.secondary:hover {
      background: #eff2ff;
    }
    .status {
      padding: 12px;
      background: #f3f4f6;
      border-radius: 8px;
      margin-top: 16px;
    }
    .status.connected {
      background: #ecfdf5;
      border: 1px solid #22c55e;
    }
    .status.error {
      background: #fef2f2;
      border: 1px solid #ef4444;
    }
    .status-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .status-dot.green {
      background: #22c55e;
    }
    .status-dot.red {
      background: #ef4444;
    }
    .status-dot.gray {
      background: #9ca3af;
    }
    .status-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #e5e7eb;
      font-size: 13px;
    }
    .status-item:last-child {
      border-bottom: none;
    }
    .status-label {
      color: #6b7280;
    }
    .status-value {
      font-weight: 500;
      color: #111827;
    }
    .message {
      font-size: 12px;
      margin-top: 4px;
      padding: 4px 8px;
      border-radius: 4px;
      display: none;
    }
    .message.success {
      color: #166534;
      background: #dcfce7;
      display: block;
    }
    .message.error {
      color: #991b1b;
      background: #fee2e2;
      display: block;
    }
    .help-text {
      font-size: 11px;
      color: #6b7280;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <h1>MaestraAI Sync</h1>

  <div class="section">
    <label for="apiKey">Clave API</label>
    <input type="password" id="apiKey" placeholder="Ingresa tu clave API" />
    <div class="help-text">Genera tu clave en Configuración</div>
    <div class="message" id="saveMsg"></div>
  </div>

  <button id="saveBtn">Guardar Configuración</button>
  <button id="testBtn" class="secondary" style="margin-top: 4px;">Probar Conexión</button>

  <div class="status" id="statusBox">
    <div class="status-header">
      <span class="status-dot gray" id="statusDot"></span>
      <span id="statusTitle">No configurado</span>
    </div>
    <div id="statusDetails"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
